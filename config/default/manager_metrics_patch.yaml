# This patch adds the --metrics-bind-address arg to enable the metrics endpoint
# using HTTPS on port :8443, served directly by the manager (no sidecar required).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: manager
        args:
        - --metrics-bind-address=:8443
        - --metrics-secure=true
        - --enable-leader-election
