              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: StepIssuerSpec defines the desired state of StepIssuer
            properties:
              caBundle:
                description: |-
                  CABundle is a base64 encoded TLS certificate used to verify connections
                  to the step certificates server. If not set the system root certificates
                  are used to validate the TLS connection.
                format: byte
                type: string
              customHeader:
                description: |-
                  CustomHeader is an optional custom HTTP header to include in signing requests.
                  The header value can be a static string or a file:// URI to read from dynamically.
                properties:
